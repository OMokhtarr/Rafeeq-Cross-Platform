apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// Read the Quran Foundation token-broker URL + client id from the SAME root .env file the
// web build uses, so the native cold-start path (RafeeqQfApi) can fetch audio timestamps
// without duplicating these values. The token broker holds the real OAuth secret server-side;
// these two are public identifiers already shipped in the JS bundle. Falls back to "" so a
// build without an env file still compiles (native timestamp fetch just no-ops).
def qfEnv = { String key ->
    def candidates = [
        new File(rootProject.projectDir, "../.env.local"),
        new File(rootProject.projectDir, "../.env.production"),
        new File(rootProject.projectDir, "../.env"),
    ]
    for (f in candidates) {
        if (f.exists()) {
            def line = f.readLines().find { it.trim().startsWith("${key}=") }
            if (line != null) return line.substring(line.indexOf('=') + 1).trim().replaceAll('^["\']|["\']$', '')
        }
    }
    return ""
}

android {
    namespace "com.rafeeq.quranquiz"
    ndkVersion = "27.0.12077973"

    // Use the variables from variables.gradle
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.rafeeq.quranquiz"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // QF config for the native audio-timestamp fetch (cold-start duration bar).
        buildConfigField "String", "QF_TOKEN_BROKER_URL", "\"${qfEnv('REACT_APP_TOKEN_BROKER_URL')}\""
        buildConfigField "String", "QF_CONTENT_API_BASE", "\"${qfEnv('REACT_APP_CONTENT_API_BASE')}\""
        buildConfigField "String", "QF_CLIENT_ID", "\"${qfEnv('REACT_APP_QF_CLIENT_ID')}\""
        
        aaptOptions {
            // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
            // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    
    // Custom APK naming
    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "Rafeeq-${variant.versionName}-${variant.buildType.name}.apk"
        }
    }

    // Custom AAB naming
    bundle {
        language { enableSplit = true }
        density { enableSplit = true }
        abi { enableSplit = true }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def aabFile = new File(
                "${project.buildDir}/outputs/bundle/${variant.buildType.name}/",
                "app-${variant.buildType.name}.aab"
            )
            tasks.named("bundle${variant.name.capitalize()}").configure {
                doLast {
                    def renamed = new File(aabFile.parent, "Rafeeq-${variant.versionName}-${variant.buildType.name}.aab")
                    if (aabFile.exists()) aabFile.renameTo(renamed)
                }
            }
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

repositories {
    maven {
        url '../capacitor-cordova-android-plugins/src/main/libs'
    }
    maven {
        url 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$rootProject.ext.androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$rootProject.ext.androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$rootProject.ext.coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation "androidx.media:media:1.7.0"
    // Media3 ExoPlayer as the native Android playback engine (used behind the
    // existing MediaBrowserServiceCompat session). Pinned to 1.3.1 — the last
    // release that builds against compileSdk 34. 1.4.x+ requires compileSdk 35.
    implementation "androidx.media3:media3-exoplayer:1.3.1"
    implementation "androidx.media3:media3-session:1.3.1"
    testImplementation "junit:junit:$rootProject.ext.junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$rootProject.ext.androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$rootProject.ext.androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}