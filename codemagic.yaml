workflows:
  ios-release:
    name: Rafeeq iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: "ios-v*"
          include: true

    integrations:
      app_store_connect: Rafeeq ASC Key # name you give it in Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store # or: ad_hoc, development
        bundle_identifier: com.rafeeq.quranquiz
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        CI: "false"  # prevents CRA treating warnings as errors

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build:prod

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Generate export options plist
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS archive
        script: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/Rafeeq.xcarchive \
            -destination "generic/platform=iOS" \
            | xcpretty

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/Rafeeq.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist \
            | xcpretty

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration # uses the integration you connected in UI
        submit_to_testflight: true # set false if you don't want TestFlight
        submit_to_app_store: false # set true when ready for production
